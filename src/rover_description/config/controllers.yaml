controller_manager:
  ros__parameters:
    update_rate: 50  # Control loop runs at 50 Hz

    # 1. The Broadcaster (Required for RViz and TF Tree)
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 2. Your Custom Double Ackermann Controller
    kratos_steering_controller:
      type: kratos_controllers/DoubleAckermannController


# =======================================================
# Controller-Specific Parameters
# =======================================================
kratos_steering_controller:
  ros__parameters:
    # Dimensions derived from your URDF properties
    # wheelbase = wheel_x_offset * 2 (0.2 * 2)
    wheelbase: 0.4     
    # track_width = wheel_y_offset * 2 (0.30 * 2)
    track_width: 0.6 
    wheel_radius: 0.12

    # Map the steering joints (Z-axis Revolute)
    front_left_steering_joint: "fl_steer_joint"
    front_right_steering_joint: "fr_steer_joint"
    rear_left_steering_joint: "rl_steer_joint"
    rear_right_steering_joint: "rr_steer_joint"

    # Map the drive joints (Y-axis Continuous)
    front_left_drive_joint: "fl_drive_joint"
    front_right_drive_joint: "fr_drive_joint"
    rear_left_drive_joint: "rl_drive_joint"
    rear_right_drive_joint: "rr_drive_joint"